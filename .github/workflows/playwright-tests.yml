name: Playwright Tests (CI)

# ระบบจะทำงานเมื่อไหร่?
on:
  push:
    branches: [ main, master ] # ทำงานทุกครั้งที่มีคนกด Push โค้ดขึ้นกิ่ง main หรือ master
  pull_request:
    branches: [ main, master ] # ทำงานเมื่อมีคนสร้าง Pull Request (เตรียมรวมโค้ด)

# สั่งให้คอมพิวเตอร์บน Cloud ทำอะไรบ้าง?
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest # สั่งเปิดคอมจำลองระบบปฏิบัติการ Linux Ubuntu เวอร์ชั่นล่าสุด

    steps:
    - name: 1. Checkout repository
      uses: actions/checkout@v4 # สั่งให้คอมจำลองดาวน์โหลดโค้ดจาก GitHub ของเรามาลงเครื่อง

    - name: 2. Set up Python
      uses: actions/setup-python@v5 # สั่งติดตั้ง Python
      with:
        python-version: '3.14.5' # ระบุเวอร์ชันให้ตรงกับโปรเจกต์ของเรา

    - name: 3. Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      # สั่งติดตั้ง Pytest, Playwright และเครื่องมืออื่นๆ จากไฟล์นี้

    - name: 4. Ensure Playwright is installed
      run: pip install pytest-playwright # การันตีว่าติดตั้งแพ็กเกจหลักเรียบร้อย

    - name: 5. Install Playwright Browsers
      run: playwright install --with-deps # สั่งโหลดเบราว์เซอร์จำลองเหมือนที่เราทำในคอมเครื่องตัวเอง

    - name: 6. Run Playwright tests
      run: pytest tests/ --html=report.html --self-contained-html # สั่งบอทวิ่งเทสต์ทุกไฟล์ในโฟลเดอร์ tests พร้อมออกรีพอร์ต

    - name: 7. Upload HTML Report
      uses: actions/upload-artifact@v4 # สั่งให้ GitHub เก็บไฟล์ report.html เอาไว้ให้เราดาวน์โหลดไปดูย้อนหลังได้
      if: always() # สั่งว่า "ไม่ว่าเทสต์จะผ่านหรือพัง" ก็ต้องอัปโหลดรีพอร์ตขึ้นมาโชว์เสมอ
      with:
        name: playwright-report
        path: report.html
        retention-days: 30 # เก็บไฟล์นี้ไว้บนระบบ GitHub 30 วัน